services:
  stt_server:
    build:
      context: .
      dockerfile: Dockerfile
    image: stt_server
    pull_policy: build
    container_name: stt_server
    hostname: stt_server
    restart: unless-stopped
    networks:
      - stt_network
    env_file:
      - .env                          # STT_HOST, STT_PORT, STT_POOL_SIZE, ...
    environment:
      TZ: America/New_York
      STT_HOST: "0.0.0.0"
      STT_PORT: "5099"
      STT_POOL_SIZE: "1"              # 1 model per sync worker (handles 1 request at a time)
      STT_DEBUG: "false"
      GUNICORN_WORKERS: "4"           # 4 sync workers = 4 concurrent requests
      WHISPER_DOWNLOAD_ROOT: "/opt/models"
      OMP_NUM_THREADS: "1"            # prevent torch from spawning extra threads
      MKL_NUM_THREADS: "1"

    ports:
      - "5099:5099"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # Live-reload application code (no rebuild needed)
      - ./stt_server.py:/opt/stt_server.py:ro
      - ./stt_client.py:/opt/stt_client.py:ro
      - ./gu.py:/opt/gu.py:ro
      # libs/stt.py - your Whisper wrapper (must NOT be modified)
      - ./libs:/opt/libs:ro
      # Persistent data
      - ./models:/opt/models          # downloaded Whisper model weights
      - ./logs:/opt/logs
      - ./recs:/opt/recs              # optional: audio recordings
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: "json-file"
      options:
        max-size: "128m"
        max-file: "3"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "python3 stt_server.py"
      # - "gunicorn --config gu.py stt_server:app"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5099/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s             # models take time to load at startup

networks:
  stt_network:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.enable_ipv6: "false"