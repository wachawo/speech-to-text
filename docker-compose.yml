services:
  stt_server:
    build:
      context: .
      dockerfile: Dockerfile
    image: stt_server_gpu
    pull_policy: build
    container_name: stt_server
    hostname: stt_server
    restart: unless-stopped
    networks:
      - stt_network
    env_file:
      - .env
    environment:
      TZ: America/New_York
      STT_HOST: "0.0.0.0"
      STT_PORT: "5099"
      STT_POOL_SIZE: "1"
      STT_DEBUG: "false"
      GUNICORN_WORKERS: "4"
      WHISPER_DOWNLOAD_ROOT: "/opt/models"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      # Force CUDA backend.
      COMPUTE_TYPE: "cuda"
    ports:
      - "5099:5099"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./stt_server.py:/opt/stt_server.py:ro
      - ./stt_client.py:/opt/stt_client.py:ro
      - ./gu.py:/opt/gu.py:ro
      - ./libs:/opt/libs:ro
      - ./models:/opt/models
      - ./logs:/opt/logs
      - ./recs:/opt/recs
    # GPU passthrough — requires nvidia-container-toolkit on host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: "json-file"
      options:
        max-size: "128m"
        max-file: "3"
    entrypoint: ["/bin/sh", "-c"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5099/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command:
      - "python3 stt_server.py"
      # - "gunicorn --config gu.py stt_server:app"

networks:
  stt_network:
    driver: bridge
    enable_ipv6: false
    driver_opts:
      com.docker.network.enable_ipv6: "false"

