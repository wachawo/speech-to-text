# Лёгкий конфиг reverse-proxy к Flask (gunicorn) на 8000
# Опционально: лимиты и базовая защита
# limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
# server для домена И для обращения по IP (server_name _)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name cgevents.noc.solutions _;
    # если размер тел POST может быть большим — увеличьте
    client_max_body_size 10m;
    # gzip на ответы JSON
    gzip on;
    gzip_types application/json application/javascript text/css text/plain application/xml;
    gzip_min_length 1024;
    # health-check напрямую в app
    location = /health {
        proxy_pass http://cgevents_app:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
    location / {
        # limit_req zone=req_limit burst=20 nodelay;  # включите при необходимости
        proxy_pass http://cgevents_app:8000;
        # Пробрасываем оригинальные заголовки
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Тонкая настройка таймаутов для API
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # Если gunicorn отдаёт 502 на длинных запросах — увеличьте
        send_timeout 60s;
    }
}
